version: '3.8'

services:
  # BANCO DE DADOS - AUTORES
  postgres-autores:
    image: postgres:15-alpine
    container_name: postgres-autores
    environment:
      POSTGRES_DB: db_autores
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - postgres_autores_data:/var/lib/postgresql/data
    networks:
      - biblioteca-net
    restart: unless-stopped

  # BANCO DE DADOS - LIVROS
  postgres-livros:
    image: postgres:15-alpine
    container_name: postgres-livros
    environment:
      POSTGRES_DB: db_livros
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5434:5432"
    volumes:
      - postgres_livros_data:/var/lib/postgresql/data
    networks:
      - biblioteca-net
    restart: unless-stopped

  # MICROSSERVIÇO DE AUTORES
  autor-ms:
    build: ./autor-ms
    container_name: autor-ms
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-autores:5432/db_autores
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
    depends_on:
      - postgres-autores
    networks:
      - biblioteca-net
    restart: unless-stopped

  # MICROSSERVIÇO DE LIVROS
  livro-ms:
    build: ./livro-ms
    container_name: livro-ms
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-livros:5432/db_livros
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
    depends_on:
      - postgres-livros
    networks:
      - biblioteca-net
    restart: unless-stopped

  # FRONT-END
  front-ms:
    build: ./front-ms
    container_name: front-ms
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      AUTOR_MS_URL: http://autor-ms:8082/api/autores
      LIVRO_MS_URL: http://livro-ms:8081/api/livros
    depends_on:
      - autor-ms
      - livro-ms
    networks:
      - biblioteca-net
    restart: unless-stopped

  # NGINX - API GATEWAY
  nginx:
    image: nginx:1.25-alpine
    container_name: api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - front-ms
      - livro-ms
      - autor-ms
    networks:
      - biblioteca-net
    restart: unless-stopped

networks:
  biblioteca-net:
    driver: bridge

volumes:
  postgres_autores_data:
  postgres_livros_data: