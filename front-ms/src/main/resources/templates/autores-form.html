<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Formulário de Autor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Biblioteca MS</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/autores">Autores</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/livros">Livros</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <h2 th:text="${autor.id} ? '✏️ Editar Autor' : '➕ Novo Autor'">Novo Autor</h2>
        
        <form th:action="${autor.id} ? '/autores/' + ${autor.id} : '/autores'" method="post">
            <input type="hidden" name="id" th:value="${autor.id}" />
            
            <div class="mb-3">
                <label class="form-label">Nome</label>
                <input type="text" class="form-control" name="nome" th:value="${autor.nome}" required />
            </div>
            
            <div class="mb-3">
                <label class="form-label">Nacionalidade</label>
                <input type="text" class="form-control" name="nacionalidade" th:value="${autor.nacionalidade}" required />
            </div>
            
            <div class="mb-3">
                <label class="form-label">Ano de Nascimento</label>
                <input type="number" class="form-control" name="anoNascimento" th:value="${autor.anoNascimento}" required />
            </div>
            
            <button type="submit" class="btn btn-success">Salvar</button>
            <a href="/autores" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
