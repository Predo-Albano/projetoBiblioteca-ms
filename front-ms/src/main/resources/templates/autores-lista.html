<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout :: head}"></th:block>
</head>
<body>
    <th:block th:replace="~{layout :: navbar}"></th:block>
    
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>📝 Lista de Autores</h2>
            <a href="/autores/novo" class="btn btn-primary">+ Novo Autor</a>
        </div>
        
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Nacionalidade</th>
                    <th>Ano de Nascimento</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="autor : ${autores}">
                    <td th:text="${autor.id}">1</td>
                    <td th:text="${autor.nome}">Nome</td>
                    <td th:text="${autor.nacionalidade}">Brasileira</td>
                    <td th:text="${autor.anoNascimento}">1839</td>
                    <td>
                        <a th:href="@{/autores/{id}/editar(id=${autor.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/autores/{id}/excluir(id=${autor.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?')">Excluir</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
