<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Erro - Biblioteca MS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Biblioteca MS</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/autores">Autores</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/livros">Livros</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-5">
        <div class="text-center">
            <div class="display-1 text-warning">👽</div>
            <h1 class="display-4 mt-3">Ops! Algo deu errado</h1>
            <p class="lead" th:text="'Código: ' + ${status}">Código: 500</p>
            <p class="h4 text-muted" th:text="${mensagem}">Mensagem de erro</p>
            <hr class="my-4">
            <a href="/" class="btn btn-primary btn-lg">🏠 Voltar para a Página Inicial</a>
            <a href="javascript:history.back()" class="btn btn-secondary btn-lg">⬅️ Voltar</a>
            <p class="mt-4 text-muted">
                <small>Se o problema persistir, entre em contato com o administrador.</small>
            </p>
        </div>
    </div>
</body>
</html>
