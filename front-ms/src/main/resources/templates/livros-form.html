<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Formulário de Livro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Biblioteca MS</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/autores">Autores</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/livros">Livros</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <h2 th:text="${livro.id} ? '✏️ Editar Livro' : '➕ Novo Livro'">Novo Livro</h2>
        
        <form th:action="${livro.id} ? '/livros/' + ${livro.id} : '/livros'" method="post">
            <input type="hidden" name="id" th:value="${livro.id}" />
            
            <div class="mb-3">
                <label class="form-label">Título</label>
                <input type="text" class="form-control" name="titulo" th:value="${livro.titulo}" required />
            </div>
            
            <div class="mb-3">
                <label class="form-label">Gênero</label>
                <input type="text" class="form-control" name="genero" th:value="${livro.genero}" required />
            </div>
            
            <div class="mb-3">
                <label class="form-label">Ano de Publicação</label>
                <input type="number" class="form-control" name="anoPublicacao" th:value="${livro.anoPublicacao}" required />
            </div>
            
            <div class="mb-3">
                <label class="form-label">Disponível</label>
                <select class="form-control" name="disponivel">
                    <option value="true" th:selected="${livro.disponivel == true}">Sim</option>
                    <option value="false" th:selected="${livro.disponivel == false}">Não</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Autor</label>
                <select class="form-control" name="autorId" required>
                    <option value="">Selecione...</option>
                    <option th:each="autor : ${autores}" th:value="${autor.id}" th:text="${autor.nome}" th:selected="${livro.autorId == autor.id}"></option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-success">Salvar</button>
            <a href="/livros" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</body>
</html>
