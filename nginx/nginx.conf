server {
    listen 80;
    server_name localhost;
    
    location / {
        proxy_pass http://front-ms:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /api/autores {
        proxy_pass http://autor-ms:8082/api/autores;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /api/livros {
        proxy_pass http://livro-ms:8081/api/livros;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}